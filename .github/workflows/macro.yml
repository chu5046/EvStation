name: EV Station Macro

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-macro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r DBmacro/requirements.txt
      - name: Run macro
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          PUBLIC_API_KEY: ${{ secrets.PUBLIC_API_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
        run: python DBmacro/macro.py